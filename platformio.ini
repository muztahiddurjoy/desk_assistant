; ─────────────────────────────────────────────────────────────────────────────
;  Desk Assistant — ESP32-S3 Dev Module
;
;    Display : 1.28" round IPS LCD, 240x240, GC9A01 driver (4-wire SPI)
;    LEDs    : 2 x WS2812 8-LED stick (16 pixels total, one data pin each)
;
;  The pin map is duplicated in three places on purpose:
;    - build_flags below   (TFT_eSPI only reads its pins from -D flags)
;    - include/pins.h      (application code; static_asserts against these)
;    - PINOUT.txt          (the wiring sheet you actually solder from)
;  include/pins.h will fail the build if it ever drifts from this file.
; ─────────────────────────────────────────────────────────────────────────────

[env:esp32-s3-devkitc-1]
platform  = espressif32@^6.9.0
board     = esp32-s3-devkitc-1
framework = arduino

monitor_speed  = 115200
monitor_filters = esp32_exception_decoder, colorize
upload_speed   = 921600

; This board talks over a CH343 USB-UART bridge (lsusb: 1a86:55d3), which
; appears as /dev/ttyACM0 — NOT the S3's native USB. That distinction decides
; where Serial output goes; see ARDUINO_USB_CDC_ON_BOOT below.
upload_port  = /dev/ttyACM0
monitor_port = /dev/ttyACM0

lib_deps =
    bodmer/TFT_eSPI@^2.5.43

; Only main.cpp is in the build. display.cpp / app_state.cpp are the fuller UI
; layer, parked (with main_full.cpp.parked) until the app needs them again.
; TO BRING THEM BACK: delete this line and restore src/main_full.cpp.parked.
build_src_filter = +<main.cpp> -<display.cpp> -<app_state.cpp>

build_flags =
    ; ── Serial routing ───────────────────────────────────────────────────────
    ; MUST be 0 for this board. 0 = Serial goes to UART0, which is wired to the
    ; CH343 bridge and comes out on /dev/ttyACM0 — the port actually in use.
    ;
    ; Set to 1 and Serial goes to the S3's *native* USB peripheral instead, and
    ; you get complete silence on the CH343 port while the firmware runs fine.
    ; Silent serial reads exactly like a dead board. Only set it to 1 if you
    ; move the cable to the port marked "USB" (it enumerates as 303a:xxxx).
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=0

    ; ── TFT_eSPI: GC9A01 round panel ─────────────────────────────────────────
    -D USER_SETUP_LOADED=1
    -D GC9A01_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=240

    ; MANDATORY ON THE ESP32-S3 — do not remove.
    ; With no port flag, TFT_eSPI falls through to a default SPI instance whose
    ; bus never starts on the S3 (VSPI doesn't exist here; SPI0/1 belong to the
    ; flash). spiStartBus() then returns NULL and the very first writecommand()
    ; inside tft.init() dereferences it: Guru Meditation, StoreProhibited,
    ; EXCVADDR 0x10, boot loop. It looks exactly like a dead panel.
    ; USE_HSPI_PORT picks SPI2, the general-purpose peripheral.
    -D USE_HSPI_PORT

    -D TFT_MISO=-1          ; panel is write-only; no MISO wire
    -D TFT_MOSI=4
    -D TFT_SCLK=5
    -D TFT_CS=6
    -D TFT_DC=7
    -D TFT_RST=8

    ; No TFT_BL / TFT_BACKLIGHT_ON: this is the 7-pin GC9A01 breakout, whose
    ; backlight is tied to VCC on the board and is always on. There is no pin to
    ; drive, so brightness is fixed in hardware. Leaving TFT_BL undefined tells
    ; TFT_eSPI not to touch a backlight pin at all.

    ; Fonts: 2 = small text, 4 = medium, 6+7 = large digits/7-seg clock face.
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT6=1
    -D LOAD_FONT7=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1

    ; 40 MHz is safe on any GPIO via the S3's GPIO matrix. 80 MHz usually works
    ; too but can glitch on long/unshielded jumper wires — raise it only once
    ; the display is confirmed stable at 40.
    -D SPI_FREQUENCY=40000000
    -D SPI_READ_FREQUENCY=20000000

    ; ── App ──────────────────────────────────────────────────────────────────
    -D CORE_DEBUG_LEVEL=0

; ─────────────────────────────────────────────────────────────────────────────
;  Module variant
;
;  Defaults above target the most common ESP32-S3 dev module: 8 MB flash, no
;  PSRAM. That configuration boots on *every* S3 dev board, which is why it is
;  the default — the firmware needs no PSRAM (largest sprite is ~26 KB).
;
;  If your board is an N16R8 (16 MB flash + 8 MB OCTAL PSRAM), uncomment:
;
;    board_upload.flash_size         = 16MB
;    board_build.partitions          = default_16MB.csv
;    board_build.arduino.memory_type = qio_opi
;    build_flags = ${env:esp32-s3-devkitc-1.build_flags} -D BOARD_HAS_PSRAM
;
;  Do NOT set memory_type = qio_opi on a board without OPI PSRAM — it hangs at
;  boot with a flash-read error before Serial ever comes up.
; ─────────────────────────────────────────────────────────────────────────────
